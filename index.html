<!DOCTYPE html>
<html lang="es">
<head>
  <!-- ===== [HEAD] ===== -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mi Netflix Personal</title>

  <!-- HLS para .m3u8 -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <!-- CSS externo -->
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <!-- ===== [HEADER] ===== -->
  <header class="topbar">
    <div class="brand">
      <span class="dot"></span>
      <h1>Mi Netflix Personal</h1>
    </div>

    <div class="topbar-actions">
      <input id="search" class="search" placeholder="Buscar..." />
      <button id="btnOpenAdmin" class="btn ghost">Administrar</button>
    </div>
  </header>

  <!-- ===== [MAIN] ===== -->
  <main class="layout">
    <!-- ===== [ADMIN PANEL] (solo tú) ===== -->
    <section id="adminPanel" class="panel hidden">
      <div class="panel-head">
        <h2>Administrar (solo lectura)</h2>
        <button id="btnCloseAdmin" class="btn ghost">Cerrar</button>
      </div>

      <div class="form">
        <label>
          Título
          <input id="title" placeholder="Ej: Clase 1" />
        </label>

        <label>
          Link VIDEO (m3u8 o mp4)
          <input id="videoLink" placeholder="https://.../master.m3u8" />
        </label>

        <label>
          Link AUDIO Español (opcional)
          <input id="audioLink" placeholder="https://.../index-a1.m3u8 o .mp3" />
        </label>

        <div class="row">
          <button id="btnSave" class="btn primary">Guardar</button>
          <button id="btnDelete" class="btn danger">Eliminar</button>
          <span class="hint">
            GitHub Pages es estático: para guardar/eliminar de verdad, edita <b>videos.json</b> y haz <b>git push</b>.
          </span>
        </div>

        <label>
          Lista (videos.json)
          <select id="library"></select>
        </label>

        <div class="row">
          <button id="btnLoad" class="btn">Cargar</button>
          <button id="btnPlayEn" class="btn">▶ Inglés</button>
          <button id="btnPlayEs" class="btn">▶ Español</button>
        </div>
      </div>
    </section>

    <!-- ===== [GALLERY] ===== -->
    <section class="gallery">
      <h2 class="section-title">Mi Galería</h2>

      <div id="grid" class="grid"></div>

      <p id="empty" class="empty hidden">
        Aún no tienes videos. Entra a “Administrar” y agrega uno en <b>videos.json</b>.
      </p>
    </section>
  </main>

  <!-- ===== [MODAL PLAYER] ===== -->
  <div id="modal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head">
        <div>
          <h3 id="modalTitle">Reproduciendo...</h3>
          <p id="modalSub" class="sub">Audio: Inglés</p>
        </div>

        <button id="btnCloseModal" class="btn ghost close-x" type="button">✕</button>
      </div>

      <video id="video" class="player" controls playsinline></video>

      <div class="modal-actions">
        <button id="btnModalEn" class="btn">Inglés</button>
        <button id="btnModalEs" class="btn">Español</button>
      </div>
    </div>
  </div>

  <!-- JS externo -->
  <script src="./app.js"></script>
</body>
</html>
